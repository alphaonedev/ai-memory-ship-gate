#
# Minimal cloud-init: only the handful of packages the droplet needs
# before the GitHub runner takes over via SSH. Everything non-trivial
# (binary install, federation config, phase scripts) happens from the
# runner over SSH so the workflow has full control and full log
# visibility. Prior runs showed cloud-init silently skipping runcmd
# on DO's ubuntu-24-04-x64 image; the SSH-driven approach sidesteps
# that entirely.

package_update: true

packages:
  - curl
  - jq
  - sqlite3
  - iptables
  - ufw
  - docker.io
  - docker-compose-v2

name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Ship-gate campaign"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time — GitHub Pages rejects concurrent deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-macros-plugin

      # Each campaign directory under runs/ gets a Markdown page. We
      # render the campaign-summary.json header and then per-phase
      # dossiers pulled directly from phase{1,2,3,4}.json — phase 2
      # carries federation convergence counts, phase 4 carries the
      # chaos convergence bound. Failed campaigns still get a page so
      # the regression history is visible.
      - name: Generate per-campaign pages from runs/
        run: |
          set -euo pipefail
          mkdir -p docs/runs
          echo "# Campaign runs" > docs/runs/index.md
          echo >> docs/runs/index.md
          echo "| Campaign | ai-memory ref | Completed | Pass |" >> docs/runs/index.md
          echo "|---|---|---|---|" >> docs/runs/index.md
          # List newest first — rely on lexicographic sort since
          # campaign ids are monotonic v0.6.0.0-final-rN.
          for dir in $(ls -1d runs/*/ | sort -r); do
            name=$(basename "$dir")
            summary="$dir/campaign-summary.json"
            [ -f "$summary" ] || continue
            ref=$(jq -r '.ai_memory_git_ref // "?"' "$summary")
            completed=$(jq -r '.completed_at // "?"' "$summary")
            pass=$(jq -r '.overall_pass // false' "$summary")
            badge=$([ "$pass" = "true" ] && echo "✅ PASS" || echo "❌ FAIL")
            echo "| [${name}](./${name}.md) | ${ref} | ${completed} | ${badge} |" >> docs/runs/index.md

            out="docs/runs/${name}.md"
            {
              echo "# Campaign ${name}"
              echo
              echo "- **ai-memory ref**: \`${ref}\`"
              echo "- **Completed at**: ${completed}"
              echo "- **Overall pass**: ${badge}"
              echo
              echo "## Phase summaries"
              echo
              for p in 1 2 3 4; do
                # Phase 1 is per-node; others are single file.
                if [ "$p" = "1" ]; then
                  files=$(ls "$dir"phase1-node-*.json 2>/dev/null || true)
                else
                  files=$(ls "$dir"phase${p}.json 2>/dev/null || true)
                fi
                [ -n "$files" ] || continue
                echo "### Phase ${p}"
                echo
                for f in $files; do
                  label=$(basename "$f" .json)
                  echo "<details><summary>${label}</summary>"
                  echo
                  echo '```json'
                  # Cap at 4KB per phase to keep pages legible.
                  head -c 4096 "$f"
                  echo
                  echo '```'
                  echo
                  echo "</details>"
                  echo
                done
              done
            } > "$out"
          done

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Ship-gate campaign"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time — GitHub Pages rejects concurrent deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-macros-plugin

      # Make sure every run directory has a self-contained index.html
      # (the generator is idempotent — re-running it re-emits the same
      # bytes). The same HTML is committed to the repo by the campaign
      # workflow's artifact commit step, but regenerating here keeps
      # older runs that predate that automation up-to-date.
      - name: Backfill per-run index.html
        run: |
          set -euo pipefail
          for dir in runs/*/; do
            ./scripts/generate_run_html.sh "$dir" || true
          done

      # Each campaign directory under runs/ gets a Markdown page. We
      # render the campaign-summary.json header and then per-phase
      # dossiers pulled directly from phase{1,2,3,4}.json — phase 2
      # carries federation convergence counts, phase 4 carries the
      # chaos convergence bound. Failed campaigns still get a page so
      # the regression history is visible.
      - name: Generate per-campaign Markdown pages from runs/
        run: |
          set -euo pipefail
          mkdir -p docs/runs
          {
            echo "# Campaign runs"
            echo
            echo "Each row links to the mkdocs-rendered campaign page plus the"
            echo "self-contained offline evidence HTML shipped in the repo."
            echo
            echo "Phase badges are per-phase status, not just the overall outcome —"
            echo "so a run with green Phase 1/2/3 and a red Phase 4 is visibly"
            echo "three-green-and-one-red without clicking into the campaign page."
            echo
            echo "| Campaign | Phase 1 | Phase 2 | Phase 3 | Phase 4 | Outcome | Completed | ai-memory ref | Evidence |"
            echo "|---|---|---|---|---|---|---|---|---|"
          } > docs/runs/index.md
          # List newest first — rely on lexicographic sort since
          # campaign ids are monotonic v0.6.0.0-final-rN.
          for dir in $(ls -1d runs/*/ | sort -r); do
            name=$(basename "$dir")
            summary="$dir/campaign-summary.json"
            [ -f "$summary" ] || continue
            ref=$(jq -r '.ai_memory_git_ref // "?"' "$summary")
            completed=$(jq -r '.completed_at // "?"' "$summary")
            # Outcome is FAIL unless every required phase produced a
            # JSON with pass:true AND overall_pass says true. The
            # collect_reports.sh aggregator historically marked runs
            # "overall_pass" based on the phases it found, which made
            # half-completed runs look green. A missing phase is a
            # FAIL signal here (we required all four to run).
            # Strict outcome: a phase file counts as PASS only if it
            # parses as JSON AND .pass == true. Anything else
            # (missing, parse error, pass:false, missing field) is
            # FAIL. collect_reports.sh historically wrote
            # overall_pass:true whenever phases 1+2 produced JSONs,
            # and several campaigns wrote the phase-4 stdout log to
            # phase4.json instead of the JSON summary — so
            # overall_pass alone lies.
            outcome="PASS"
            pass_of() {
              local file="$1"
              [ -f "$file" ] || { echo "FAIL"; return; }
              local v
              v=$(jq -r 'if type == "object" and (.pass == true) then "PASS" else "FAIL" end' "$file" 2>/dev/null)
              echo "${v:-FAIL}"
            }
            # Per-phase derivation — runs table shows each phase status
            # so readers see at a glance that r15+ runs are 3-of-4-green
            # (Phase 1/2/3 PASS, Phase 4 FAIL), not uniformly red.
            per_phase() {
              local phase="$1"
              if [ "$phase" = "1" ]; then
                local any=false all=true
                for n in "$dir"phase1-node-*.json; do
                  [ -e "$n" ] || continue
                  any=true
                  [ "$(pass_of "$n")" = "PASS" ] || all=false
                done
                if [ "$any" = "false" ]; then echo "—"; return; fi
                [ "$all" = "true" ] && echo "✅" || echo "❌"
                return
              fi
              local file="$dir/phase${phase}.json"
              [ -f "$file" ] || { echo "—"; return; }
              [ "$(pass_of "$file")" = "PASS" ] && echo "✅" || echo "❌"
            }
            p1=$(per_phase 1); p2=$(per_phase 2); p3=$(per_phase 3); p4=$(per_phase 4)

            summary_pass=$(jq -r '.overall_pass // false' "$summary")
            outcome="PASS"
            [ "$summary_pass" = "true" ] || outcome="FAIL"
            for p in phase2.json phase3.json phase4.json; do
              [ "$(pass_of "$dir$p")" = "PASS" ] || { outcome="FAIL"; break; }
            done
            p1_ok=true; has_p1=false
            for n in "$dir"phase1-node-*.json; do
              [ -e "$n" ] || continue
              has_p1=true
              [ "$(pass_of "$n")" = "PASS" ] || { p1_ok=false; break; }
            done
            [ "$has_p1" = "true" ] && [ "$p1_ok" = "true" ] || outcome="FAIL"
            evidence="[offline HTML](../evidence/${name}/index.html)"
            echo "| [${name}](./${name}.md) | ${p1} | ${p2} | ${p3} | ${p4} | ${outcome} | ${completed} | ${ref} | ${evidence} |" >> docs/runs/index.md

            out="docs/runs/${name}.md"
            {
              echo "# Campaign ${name}"
              echo
              echo "- **ai-memory ref**: \`${ref}\`"
              echo "- **Completed at**: ${completed}"
              echo "- **Outcome**: ${outcome}"
              echo "- **Offline evidence**: [index.html](../evidence/${name}/index.html)"
              echo "  (self-contained page with every artifact plus AI NHI tri-audience analysis)"
              echo
              echo "## Phase summaries"
              echo
              for p in 1 2 3 4; do
                # Phase 1 is per-node; others are single file.
                if [ "$p" = "1" ]; then
                  files=$(ls "$dir"phase1-node-*.json 2>/dev/null || true)
                else
                  files=$(ls "$dir"phase${p}.json 2>/dev/null || true)
                fi
                [ -n "$files" ] || continue
                echo "### Phase ${p}"
                echo
                for f in $files; do
                  label=$(basename "$f" .json)
                  echo "<details><summary>${label}</summary>"
                  echo
                  echo '```json'
                  # Cap at 4KB per phase to keep pages legible.
                  head -c 4096 "$f"
                  echo
                  echo '```'
                  echo
                  echo "</details>"
                  echo
                done
              done
            } > "$out"
          done

      - name: Build site
        run: mkdocs build

      # mkdocs only publishes content under docs/. The per-run
      # index.html files live next to the JSON artifacts under runs/
      # so a clone of the repo is self-contained. To make those same
      # HTMLs reachable from the deployed Pages site, copy the whole
      # runs/ tree into site/evidence/ as a post-build step. The
      # Markdown campaign pages link into ../evidence/<run>/ so
      # operators can download the raw JSON right next to the HTML.
      - name: Mirror runs/ to site/evidence/ for offline-evidence links
        run: |
          set -euo pipefail
          mkdir -p site/evidence
          cp -r runs/. site/evidence/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

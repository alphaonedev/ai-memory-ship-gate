name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Ship-gate campaign"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time — GitHub Pages rejects concurrent deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-macros-plugin

      # Make sure every run directory has a self-contained index.html
      # (the generator is idempotent — re-running it re-emits the same
      # bytes). The same HTML is committed to the repo by the campaign
      # workflow's artefact commit step, but regenerating here keeps
      # older runs that predate that automation up-to-date.
      - name: Backfill per-run index.html
        run: |
          set -euo pipefail
          for dir in runs/*/; do
            ./scripts/generate_run_html.sh "$dir" || true
          done

      # Each campaign directory under runs/ gets a Markdown page. We
      # render the campaign-summary.json header and then per-phase
      # dossiers pulled directly from phase{1,2,3,4}.json — phase 2
      # carries federation convergence counts, phase 4 carries the
      # chaos convergence bound. Failed campaigns still get a page so
      # the regression history is visible.
      - name: Generate per-campaign Markdown pages from runs/
        run: |
          set -euo pipefail
          mkdir -p docs/runs
          {
            echo "# Campaign runs"
            echo
            echo "Each row links to the mkdocs-rendered campaign page plus the"
            echo "self-contained offline evidence HTML shipped in the repo."
            echo
            echo "| Campaign | ai-memory ref | Completed | Pass | Evidence |"
            echo "|---|---|---|---|---|"
          } > docs/runs/index.md
          # List newest first — rely on lexicographic sort since
          # campaign ids are monotonic v0.6.0.0-final-rN.
          for dir in $(ls -1d runs/*/ | sort -r); do
            name=$(basename "$dir")
            summary="$dir/campaign-summary.json"
            [ -f "$summary" ] || continue
            ref=$(jq -r '.ai_memory_git_ref // "?"' "$summary")
            completed=$(jq -r '.completed_at // "?"' "$summary")
            pass=$(jq -r '.overall_pass // false' "$summary")
            badge=$([ "$pass" = "true" ] && echo "PASS" || echo "FAIL")
            evidence="[offline HTML](../evidence/${name}/index.html)"
            echo "| [${name}](./${name}.md) | ${ref} | ${completed} | ${badge} | ${evidence} |" >> docs/runs/index.md

            out="docs/runs/${name}.md"
            {
              echo "# Campaign ${name}"
              echo
              echo "- **ai-memory ref**: \`${ref}\`"
              echo "- **Completed at**: ${completed}"
              echo "- **Overall pass**: ${badge}"
              echo "- **Offline evidence**: [index.html](../evidence/${name}/index.html)"
              echo "  (self-contained page with every artefact, browsable from a clone of the repo)"
              echo
              echo "## Phase summaries"
              echo
              for p in 1 2 3 4; do
                # Phase 1 is per-node; others are single file.
                if [ "$p" = "1" ]; then
                  files=$(ls "$dir"phase1-node-*.json 2>/dev/null || true)
                else
                  files=$(ls "$dir"phase${p}.json 2>/dev/null || true)
                fi
                [ -n "$files" ] || continue
                echo "### Phase ${p}"
                echo
                for f in $files; do
                  label=$(basename "$f" .json)
                  echo "<details><summary>${label}</summary>"
                  echo
                  echo '```json'
                  # Cap at 4KB per phase to keep pages legible.
                  head -c 4096 "$f"
                  echo
                  echo '```'
                  echo
                  echo "</details>"
                  echo
                done
              done
            } > "$out"
          done

      - name: Build site
        run: mkdocs build

      # mkdocs only publishes content under docs/. The per-run
      # index.html files live next to the JSON artefacts under runs/
      # so a clone of the repo is self-contained. To make those same
      # HTMLs reachable from the deployed Pages site, copy the whole
      # runs/ tree into site/evidence/ as a post-build step. The
      # Markdown campaign pages link into ../evidence/<run>/ so
      # operators can download the raw JSON right next to the HTML.
      - name: Mirror runs/ to site/evidence/ for offline-evidence links
        run: |
          set -euo pipefail
          mkdir -p site/evidence
          cp -r runs/. site/evidence/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

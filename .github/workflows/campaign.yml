name: Ship-gate campaign

on:
  workflow_dispatch:
    inputs:
      ai_memory_git_ref:
        description: "ai-memory-mcp git ref to validate"
        required: true
        default: "release/v0.6.0"
      campaign_id:
        description: "Campaign identifier (becomes the runs/ dir name)"
        required: true
        default: "v0.6.0.0-candidate"
      region:
        description: "DigitalOcean region"
        required: false
        default: "nyc3"
      chaos_cycles:
        description: "Phase-4 cycles per fault class (default 50 for fast gate; 200 for full soak)"
        required: false
        default: "50"
      chaos_faults:
        description: "Space-separated chaos faults. Default: kill_primary_mid_write (the critical disaster scenario). Opt-in extras: partition_minority, drop_random_acks, clock_skew_peer."
        required: false
        default: "kill_primary_mid_write"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ship-gate-campaign
  cancel-in-progress: false

jobs:
  campaign:
    name: "Provision + run all 4 phases"
    runs-on: ubuntu-24.04
    timeout-minutes: 90  # Tight ceiling — 90 min is 1.5× the 60-min target
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      DIGITALOCEAN_SSH_KEY_FINGERPRINT: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_ssh_key_fingerprint: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_campaign_id: ${{ github.event.inputs.campaign_id }}
      TF_VAR_ai_memory_git_ref: ${{ github.event.inputs.ai_memory_git_ref }}
      TF_VAR_region: ${{ github.event.inputs.region }}
      CAMPAIGN_ID: ${{ github.event.inputs.campaign_id }}
      AI_MEMORY_GIT_REF: ${{ github.event.inputs.ai_memory_git_ref }}
      CHAOS_CYCLES: ${{ github.event.inputs.chaos_cycles }}
      CHAOS_FAULTS: ${{ github.event.inputs.chaos_faults }}

    steps:
      - uses: actions/checkout@v5

      # ───── Build ai-memory binary ON THE RUNNER (fast, cached) ─────
      - name: Checkout ai-memory-mcp at ref
        uses: actions/checkout@v5
        with:
          repository: alphaonedev/ai-memory-mcp
          ref: ${{ github.event.inputs.ai_memory_git_ref }}
          path: ai-memory-mcp

      - name: Install Rust toolchain 1.88
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ai-memory-mcp

      - name: Build ai-memory binary
        working-directory: ai-memory-mcp
        run: |
          cargo build --release --features sal,sal-postgres
          ls -la target/release/ai-memory
          target/release/ai-memory --version

      # ───── Provision infra (Terraform) ─────
      - name: Set up SSH private key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init + apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output -json > ../terraform-output.json

      # ───── Wait for SSH (not cloud-init) ─────
      - name: Wait for SSH
        id: wait
        run: |
          set -e
          # PUBLIC IPs — used by the runner's SSH to reach droplets.
          NODE_A_IP=$(jq -r '.peer_nodes.value["node-a"].public' terraform-output.json)
          NODE_B_IP=$(jq -r '.peer_nodes.value["node-b"].public' terraform-output.json)
          NODE_C_IP=$(jq -r '.peer_nodes.value["node-c"].public' terraform-output.json)
          CHAOS_IP=$(jq -r '.chaos_client.value' terraform-output.json)
          # PRIVATE IPs — used by peer-to-peer federation traffic. The
          # firewall allow-rule on port 9077 targets private IPs only, so
          # inter-droplet HTTP MUST use these; public-IP traffic would be
          # dropped as not-allow-listed.
          NODE_A_PRIV=$(jq -r '.peer_nodes.value["node-a"].private' terraform-output.json)
          NODE_B_PRIV=$(jq -r '.peer_nodes.value["node-b"].private' terraform-output.json)
          NODE_C_PRIV=$(jq -r '.peer_nodes.value["node-c"].private' terraform-output.json)

          failed=0
          for role in a:$NODE_A_IP b:$NODE_B_IP c:$NODE_C_IP chaos:$CHAOS_IP; do
            key=${role%%:*}; ip=${role##*:}
            echo "::group::wait-for-ssh node-$key ($ip)"
            ready=false
            for attempt in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 \
                   -o BatchMode=yes root@"$ip" "uname -a" 2>/dev/null; then
                echo "ssh up on node-$key after ${attempt}×5s"
                ready=true
                break
              fi
              sleep 5
            done
            echo "::endgroup::"
            [ "$ready" = true ] || { echo "::error::node-$key SSH never responded"; failed=1; }
          done

          echo "node_a=$NODE_A_IP"       >> "$GITHUB_OUTPUT"
          echo "node_b=$NODE_B_IP"       >> "$GITHUB_OUTPUT"
          echo "node_c=$NODE_C_IP"       >> "$GITHUB_OUTPUT"
          echo "chaos=$CHAOS_IP"         >> "$GITHUB_OUTPUT"
          echo "node_a_priv=$NODE_A_PRIV" >> "$GITHUB_OUTPUT"
          echo "node_b_priv=$NODE_B_PRIV" >> "$GITHUB_OUTPUT"
          echo "node_c_priv=$NODE_C_PRIV" >> "$GITHUB_OUTPUT"
          exit $failed

      # ───── Provision droplets via SSH (full control, every step logged) ─────
      - name: Provision droplets via SSH
        id: provision
        run: |
          set -e
          BINARY=ai-memory-mcp/target/release/ai-memory

          for role in a:${{ steps.wait.outputs.node_a }} \
                      b:${{ steps.wait.outputs.node_b }} \
                      c:${{ steps.wait.outputs.node_c }} \
                      chaos:${{ steps.wait.outputs.chaos }}; do
            key=${role%%:*}; ip=${role##*:}
            echo "::group::provision node-$key ($ip)"

            # Wait for cloud-init's apt packages to complete (or skip)
            # — we don't depend on it, but don't want to race apt locks.
            ssh -o StrictHostKeyChecking=no root@"$ip" '
              set -euxo pipefail
              # Ensure our packages regardless of whether cloud-init
              # successfully ran the packages: directive.
              cloud-init status --wait 2>/dev/null || true
              DEBIAN_FRONTEND=noninteractive apt-get update -y
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                curl jq sqlite3 iptables ufw docker.io docker-compose-v2
              mkdir -p /etc/ai-memory /opt/ai-memory-mcp

              # OS-tier firewall explicitly DISABLED.
              #
              # The DigitalOcean Cloud Firewall is the single
              # enforcement boundary. Droplet-local UFW/iptables
              # policies are intentionally OFF so that:
              #   (a) the chaos harness can freely inject/withdraw
              #       its own iptables rules on the loopback OUTPUT
              #       chain without fighting a competing policy
              #   (b) on Ubuntu 24.04 where UFW can be active out of
              #       the box, we don'"'"'t have a second firewall
              #       silently blocking VPC traffic or loopback
              #       federation calls
              #   (c) a single point of firewall truth (DO Cloud
              #       Firewall) means operators don'"'"'t need to
              #       reason about policy composition
              #
              # If UFW is present, disable it. No-op otherwise.
              if command -v ufw >/dev/null 2>&1; then
                ufw --force disable || true
                ufw status verbose || true
              fi

              mkdir -p /etc/ai-memory /opt/ai-memory-mcp
              # Dead-man switch: hard ceiling on droplet uptime.
              MINS=$((8 * 60))
              shutdown -P "+$MINS" "ai-memory ship-gate dead-man switch" &
              disown
            '

            # SCP the pre-built binary + checked-out source tree for
            # phase-3 docker-compose / phase-4 chaos harness.
            scp -o StrictHostKeyChecking=no -q "$BINARY" root@"$ip":/usr/local/bin/ai-memory
            ssh -o StrictHostKeyChecking=no root@"$ip" \
              "chmod +x /usr/local/bin/ai-memory && ai-memory --version > /etc/ai-memory/version && ai-memory --version"

            # Phase 3 needs the ai-memory-mcp packaging dir on node-a;
            # Phase 4 needs it on the chaos client.
            if [ "$key" = "a" ] || [ "$key" = "chaos" ]; then
              scp -r -o StrictHostKeyChecking=no -q ai-memory-mcp/packaging root@"$ip":/opt/ai-memory-mcp/
            fi

            # Phase 2 reconfigures `ai-memory serve` across all peers
            # via SSH; it runs ON the chaos client which therefore needs
            # the campaign SSH key to reach the peers. Deploy it here
            # (run 8 of ship-gate exposed this gap — phase 2 got an
            # exit 255 because chaos had no private key).
            if [ "$key" = "chaos" ]; then
              scp -o StrictHostKeyChecking=no -q ~/.ssh/id_ed25519 root@"$ip":/root/.ssh/id_ed25519
              ssh -o StrictHostKeyChecking=no root@"$ip" "chmod 600 /root/.ssh/id_ed25519"
            fi

            echo "::endgroup::"
          done

      # ───── Phase 1: functional on each peer, all 3 in parallel ─────
      - name: Phase 1 — functional on each node (parallel)
        run: |
          mkdir -p phase-reports
          for role in a:${{ steps.wait.outputs.node_a }} \
                      b:${{ steps.wait.outputs.node_b }} \
                      c:${{ steps.wait.outputs.node_c }}; do
            key=${role%%:*}; ip=${role##*:}
            (
              echo "::group::phase1 node-$key"
              ssh -o StrictHostKeyChecking=no root@"$ip" 'bash -s' \
                < scripts/phase1_functional.sh \
                > phase-reports/phase1-node-$key.json
              echo "::endgroup::"
            ) &
          done
          wait

      # ───── Phase 2: federation burst + quorum probes ─────
      - name: Phase 2 — multi-agent federation
        run: |
          scp -o StrictHostKeyChecking=no scripts/phase2_multiagent.sh \
            root@${{ steps.wait.outputs.chaos }}:/root/phase2.sh
          # Pass BOTH public + private IPs. Public for SSH-reconfigure
          # (chaos → peer control plane), private for the write burst
          # (peer-to-peer federation uses the VPC-only firewall allow
          # rule on port 9077).
          ssh -o StrictHostKeyChecking=no root@${{ steps.wait.outputs.chaos }} \
            "NODE_A_IP=${{ steps.wait.outputs.node_a }} \
             NODE_B_IP=${{ steps.wait.outputs.node_b }} \
             NODE_C_IP=${{ steps.wait.outputs.node_c }} \
             NODE_A_PRIV=${{ steps.wait.outputs.node_a_priv }} \
             NODE_B_PRIV=${{ steps.wait.outputs.node_b_priv }} \
             NODE_C_PRIV=${{ steps.wait.outputs.node_c_priv }} \
             bash /root/phase2.sh" \
             > phase-reports/phase2.json

      # ───── Phase 3: SQLite ↔ Postgres roundtrip (on node-a) ─────
      - name: Phase 3 — migration roundtrip
        run: |
          scp -o StrictHostKeyChecking=no scripts/phase3_migration.sh \
            root@${{ steps.wait.outputs.node_a }}:/root/phase3.sh
          ssh -o StrictHostKeyChecking=no root@${{ steps.wait.outputs.node_a }} \
            "bash /root/phase3.sh" > phase-reports/phase3.json

      # ───── Phase 4: chaos (reduced cycles, 2 real faults by default) ─────
      - name: Phase 4 — chaos campaign
        run: |
          scp -o StrictHostKeyChecking=no scripts/phase4_chaos.sh \
            root@${{ steps.wait.outputs.chaos }}:/root/phase4.sh
          ssh -o StrictHostKeyChecking=no root@${{ steps.wait.outputs.chaos }} \
            "NODE_A_IP=${{ steps.wait.outputs.node_a }} \
             NODE_B_IP=${{ steps.wait.outputs.node_b }} \
             NODE_C_IP=${{ steps.wait.outputs.node_c }} \
             CYCLES=${{ github.event.inputs.chaos_cycles }} \
             FAULTS='${{ github.event.inputs.chaos_faults }}' \
             bash /root/phase4.sh" \
             > phase-reports/phase4.json

      - name: Aggregate campaign summary
        if: always()
        run: |
          CAMPAIGN_ID="${{ github.event.inputs.campaign_id }}" \
          AI_MEMORY_GIT_REF="${{ github.event.inputs.ai_memory_git_ref }}" \
            bash scripts/collect_reports.sh \
              campaign-summary.json phase-reports || true

      - name: Commit campaign artifacts
        if: always()
        run: |
          set +e
          CAMPAIGN_DIR="runs/${{ github.event.inputs.campaign_id }}"
          mkdir -p "$CAMPAIGN_DIR"
          cp phase-reports/*.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          cp campaign-summary.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          # Emit the self-contained offline-evidence HTML next to the
          # JSONs so clones of the repo are browsable without a pages
          # build. `|| true` so the artifact commit still lands even
          # if the generator chokes on a malformed JSON.
          bash scripts/generate_run_html.sh "$CAMPAIGN_DIR" || true
          git config user.name "ship-gate-bot"
          git config user.email "ship-gate-bot@users.noreply.github.com"
          git add "$CAMPAIGN_DIR" || true
          # Nothing to commit is not an error — --allow-empty-message fails
          # silently when there's no diff, but --porcelain tells us directly.
          if [ -z "$(git status --porcelain)" ]; then
            echo "::notice::no campaign artifacts to commit"
            exit 0
          fi
          git commit -m "campaign: ${{ github.event.inputs.campaign_id }} artifacts" || true
          # Push with rebase-on-reject retry. The prior `|| true` swallowed
          # reject-because-non-fast-forward errors silently, which left
          # several campaigns (r19, r20) without artifacts on main because
          # a concurrent push from another workflow had advanced the tip.
          # Retry up to 5 times with fetch+rebase in between.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "::notice::campaign artifacts pushed on attempt $attempt"
              exit 0
            fi
            echo "::warning::push rejected on attempt $attempt; fetching + rebasing"
            git fetch origin main
            git rebase origin/main || { echo "::error::rebase conflict"; git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done
          echo "::error::failed to push campaign artifacts after 5 attempts"
          exit 1

      - name: Tear down infrastructure
        if: always()
        working-directory: terraform
        run: |
          terraform destroy -auto-approve || true

      - name: Final verdict
        if: always()
        run: |
          VERDICT=$(jq '.overall_pass' campaign-summary.json 2>/dev/null || echo false)
          echo "Overall pass: $VERDICT"
          [ "$VERDICT" = "true" ]
